name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Android
        run: |
          # 不使用 :android: 前缀，直接在根目录构建
          # 在 KMP 项目中，assembleDebug 通常会自动构建所有包含 Android 的模块
          ./gradlew clean assembleDebug --refresh-dependencies --no-build-cache --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          # APK 通常会被生成在 android/build/outputs/apk/debug/ 下
          path: android/build/outputs/apk/debug/*.apk
