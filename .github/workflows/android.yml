name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Android
        run: |
          # 关键点：在根目录执行，通过 :android: 前缀指定构建子模块
          ./gradlew :android:clean :android:assembleDebug \
          --refresh-dependencies \
          --no-build-cache \
          --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          # APK 的生成路径通常在子模块的 build 目录下
          path: android/build/outputs/apk/debug/*.apk
