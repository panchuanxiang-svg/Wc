name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle
          # 告诉 Gradle 缓存位于 android 目录下
          cache-dependency-path: android/build.gradle.kts 

      - name: Grant Execute Permission
        # 注意：这里需要指向 android 目录下的 gradlew
        run: chmod +x android/gradlew

      - name: Hard Clean and Build
        # 在这里进入 android 目录执行命令
        run: |
          cd android
          echo "Verifying gradle-wrapper.properties..."
          cat gradle/wrapper/gradle-wrapper.properties
          
          # 清理可能损坏的 Wrapper 缓存
          rm -rf ~/.gradle/wrapper/dists/*
          
          # 执行构建
          ./gradlew clean assembleDebug \
          --refresh-dependencies \
          --no-build-cache \
          --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          # 这里保持不变，因为它是相对于工作区根目录的
          path: android/build/outputs/apk/debug/*.apk
