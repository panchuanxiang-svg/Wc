name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: List Projects and Build
        run: |
          # 1. 先列出所有可用的项目模块，这样你就能看到真实的名字
          ./gradlew projects
          
          # 2. 尝试构建。
          # 如果你的项目是标准的 KMP，通常直接运行 assembleDebug 就能构建所有应用模块。
          # 如果直接运行失败，查看上面 ./gradlew projects 的输出，找到类似 ":app" 或 ":composeApp" 的名字，
          # 然后把下面这行改成 ./gradlew :项目名:assembleDebug
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: |
            **/build/outputs/apk/debug/*.apk
