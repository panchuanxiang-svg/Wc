name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: List Projects & Tasks
        # 列出 Gradle 可用模块和任务，方便确认模块名
        run: |
          ./gradlew projects > projects.txt
          ./gradlew :android:tasks --all > tasks.txt || true
      - name: Upload Project & Task Info
        uses: actions/upload-artifact@v4
        with:
          name: gradle-projects-tasks
          path: |
            projects.txt
            tasks.txt

      - name: Build and Save Log
        # 捕获所有输出，包括错误
        run: |
          ./gradlew :android:assembleDebug --stacktrace > build_log.txt 2>&1 || true

      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log
          path: build_log.txt
