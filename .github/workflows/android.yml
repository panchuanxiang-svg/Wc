name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Grant Permission
        run: chmod +x ./gradlew

      - name: Show Root Files
        run: ls

      - name: Show Projects
        run: ./gradlew projects

      - name: Build APK
        run: ./gradlew :android:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: android/build/outputs/apk/debug/*.apk
