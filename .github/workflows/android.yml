name: Android CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Change Wrapper Permissions
        run: chmod +x gradlew

      # 核心编译步骤：这里已经为你加上了彻底清除缓存、强制刷新网络依赖的命令
      - name: Build with Gradle
        run: ./gradlew clean assembleDebug --no-build-cache --refresh-dependencies

      - name: Upload Android Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/build/outputs/apk/debug/*.apk

      - name: Build Desktop Package
        run: ./gradlew :desktop:packageDistributionForCurrentOS

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-distribution
          path: desktop/build/compose/binaries/main/**/*
