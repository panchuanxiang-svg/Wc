      - name: Debug and Build
        run: |
          echo "--- 当前目录下的文件结构 ---"
          ls -R
          
          echo "--- 准备构建 ---"
          # 假设我们需要执行根目录下的 gradlew
          # 如果你的 build.gradle 在 android 目录下，我们可能需要 cd android
          # 但如果我们直接在根目录运行 ./gradlew，我们需要确保它能识别到子模块
          
          # 尝试直接在根目录执行构建（通常 Android 项目在根目录也能识别子模块）
          ./gradlew clean assembleDebug --refresh-dependencies --no-build-cache --stacktrace
